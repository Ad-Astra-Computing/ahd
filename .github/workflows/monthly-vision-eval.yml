# Monthly vision + image-gen eval.
#
# Three passes per run, all against fresh samples, all committed to
# docs/evals/monthly/<date>-{source,vision,image}.md:
#
#   1. Text source-lint eval     — same roster as weekly, n=30
#   2. Text vision-critic eval   — renders each text sample, scores
#                                   against the 14 vision rules
#   3. Image-generation eval     — CF image models (FLUX, SDXL,
#                                   DreamShaper), n=5, vision
#                                   critic against the 14 rules
#
# Why monthly not weekly: vision scoring costs real money
# (Anthropic vision API, billed per image input token). At Haiku
# defaults ~$0.001/image; 600 text images + 40 image-gen images
# ~= $0.60-$1.00/run. Monthly cadence keeps the annual bill
# bounded and still catches drift well ahead of any six-month
# signal loss.
#
# Budget breakdown:
#   - Text gen (600 samples):      free (CF OSS)
#   - Text vision (600 images):    ~$0.60
#   - Image gen (40 images):       free (CF free tier, <10k
#                                  neurons/day)
#   - Image vision (40 images):    ~$0.04
#   Total: ~$0.60-$1 / month
#
# Secrets required on the repo:
#   - CF_API_TOKEN + CF_ACCOUNT_ID: text generation via CF Workers AI
#   - ANTHROPIC_API_KEY: the vision critic's model access
#
# Output: a dated report at docs/evals/monthly/<YYYY-MM-DD>.md with
# per-cell vision-tell counts, per-tell frequency, and comparison
# to source-only numbers from the same samples.

name: monthly-vision-eval

on:
  schedule:
    # First Monday of each month, 06:13 UTC. Falls between day 1 and
    # day 7; the 'Mon' filter selects only Mondays so the effective
    # cadence is once per month. Off-zero minute to avoid the herd.
    - cron: "13 6 1-7 * 1"
  workflow_dispatch:
    inputs:
      note:
        description: "Optional note to include in the generated report header"
        required: false
        default: ""
      smoke_mode:
        description: "Smoke test: 1 model, n=2 per vertical, no commit. Use to prove integration end-to-end (~5 min, ~$0.01) without consuming the monthly budget."
        type: boolean
        required: false
        default: false

permissions:
  contents: write

jobs:
  vision-eval:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node (pinned)
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"

      - name: Install
        run: npm ci

      - name: Build (tsc -> dist/)
        run: npm run build

      - name: Install chromium for the vision-critic render step
        # Vision critic renders each HTML sample via headless
        # chromium before scoring. Playwright's install is the
        # most portable path in CI today; when ahd-site moves to
        # GitHub and we add nix-in-CI for reproducible chromium,
        # swap this for the flake's pkgs.chromium binary.
        run: npx playwright install --with-deps chromium

      - name: Run eval-live (fresh samples for this run)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        run: |
          set -x
          # Smoke mode: one cheap model, n=2. The point of smoke is
          # to exercise every step end-to-end, not to produce a
          # publishable run. Full mode keeps the weekly roster, n=30.
          REPORT_DATE=$(date -u +%Y-%m-%d)
          mkdir -p docs/evals/monthly
          if [ "${{ inputs.smoke_mode }}" = "true" ]; then
            MODELS="cf:@cf/google/gemma-4-26b-a4b-it"
            N=2
          else
            MODELS="cf:@cf/google/gemma-4-26b-a4b-it,cf:@cf/meta/llama-4-scout-17b-16e-instruct,cf:@cf/mistralai/mistral-small-3.1-24b-instruct,cf:@cf/openai/gpt-oss-120b,cf:@cf/qwen/qwen3-30b-a3b-fp8"
            N=30
          fi
          node ./bin/ahd.js eval-live swiss-editorial \
            --brief briefs/landing.yml \
            --models "$MODELS" \
            --n "$N" \
            --out evals \
            --report "docs/evals/monthly/${REPORT_DATE}-source.md"
          echo "REPORT_DATE=$REPORT_DATE" >> "$GITHUB_ENV"

      - name: Run vision critique (Anthropic, Haiku default)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          set -x
          # Score each rendered sample against the 14 vision rules.
          # --critic anthropic uses the Anthropic HTTP API because
          # Claude Code CLI can't authenticate on a headless runner
          # without a subscription session. Haiku is the default
          # critic model (lowest cost at reasonable fidelity).
          node ./bin/ahd.js critique swiss-editorial \
            --samples evals \
            --critic anthropic \
            --out critiques \
            --report "docs/evals/monthly/${{ env.REPORT_DATE }}-vision.md"

      - name: Run image-generation eval (CF image models, scored via vision critic)
        env:
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          # Image-gen vertical: same methodology as text, against
          # CF Workers AI image models on the free tier. Raw and
          # compiled conditions produce PNGs; vision critic scores
          # each against the 14 vision rules (4 of which are
          # image-specific: malformed anatomy, Midjourney-face
          # symmetry, decorative cursive, stock diversity casting).
          #
          # Four cells × 2 conditions × n=5 = 40 images. CF charges
          # ~100 neurons per image, total ~4k neurons, well inside
          # the 10k/day free-tier limit. Vision scoring of 40
          # images is ~\$0.04 at Haiku prices.
          set -x
          if [ "${{ inputs.smoke_mode }}" = "true" ]; then
            IMG_MODELS="cfimg:@cf/black-forest-labs/flux-1-schnell"
            IMG_N=2
          else
            IMG_MODELS="cfimg:@cf/black-forest-labs/flux-1-schnell,cfimg:@cf/bytedance/stable-diffusion-xl-lightning,cfimg:@cf/stabilityai/stable-diffusion-xl-base-1.0,cfimg:@cf/lykon/dreamshaper-8-lcm"
            IMG_N=5
          fi
          node ./bin/ahd.js eval-image editorial-illustration \
            --brief briefs/editorial-illustration.yml \
            --models "$IMG_MODELS" \
            --n "$IMG_N" \
            --critic anthropic \
            --report "docs/evals/monthly/${{ env.REPORT_DATE }}-image.md"

      - name: Commit all three reports
        # Smoke runs prove integration; their numbers are not
        # publishable (n=2 is well under any reportable threshold) so
        # the smoke path skips the commit entirely. The reports still
        # exist in the workflow's working tree if you need to inspect
        # them via the Actions UI.
        if: inputs.smoke_mode != true
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add docs/evals/monthly/
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            git commit -m "docs(evals): monthly source + vision + image-gen run ${{ env.REPORT_DATE }}" -m "Automated monthly eval across all three verticals: text source linter, text rendered-pixel vision critic, and image-generation vision critic. See the three files for per-cell numbers."
            git push
          fi

      - name: Smoke-mode summary
        if: inputs.smoke_mode == true
        run: |
          echo "::notice::Smoke run complete. All three steps reached without auth/rate-limit failures. Reports live in docs/evals/monthly/ in this workflow's working tree but are NOT committed (smoke n=2 is below any publishable threshold)."
