# Drop-in deploy workflow for a project that consumes AHD as its
# provenance layer (AHD runs in the build step; /ahd.json regenerates on
# every deploy).
#
# Copy this into your project's `.github/workflows/deploy.yml` and adjust:
#   - `CF_PAGES_PROJECT` in the deploy command (your Cloudflare Pages project name)
#   - `NODE_VERSION` if you're not on 22
#   - CF_API_TOKEN and CF_ACCOUNT_ID secrets in repo settings
#
# Assumes:
#   - `npm run build` runs AHD's `scripts/ahd-provenance.mjs` as a post-build
#     step and emits `dist/ahd.json`. That is the canonical contract. Running
#     `ahd` in a separate workflow step is unnecessary and duplicates work.
#   - The project lints cleanly (or the `.ahd.json` overrides any warns/errors
#     it accepts with declared reasons). AHD exits non-zero on error-severity
#     rules; that will fail the build before deploy, which is the point.
#
# Plain Node, no nix. AHD's source linter is pure JS. The Nix devShell only
# matters if you also want to run the vision critic in CI (`ahd critique`),
# which needs a Chromium binary — see ahd-nix.example.yml for that.

name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Check out source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0  # ahd-provenance reads git sha + short sha

      - name: Set up Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # `npm run build` is where AHD runs. The project's build script ends
      # with `node scripts/ahd-provenance.mjs` which writes dist/ahd.json
      # and exits non-zero if any error-severity rule fired. Any bare
      # `npx ahd lint` step here would just duplicate that work.
      - name: Build site (runs AHD lint + writes dist/ahd.json)
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=CF_PAGES_PROJECT --branch=main
