# Tag-driven release workflow.
#
# Trigger: push a semver tag like v0.7.0. Everything else is a no-op.
#
# What runs:
#   1. Full gate (tsc, tests, token validation) so a broken HEAD
#      cannot ship by accident.
#   2. Build the npm tarball from dist/.
#   3. Publish to npm with --access public and --provenance so the
#      resulting package carries an attestation linking it back to
#      the exact commit and workflow run.
#   4. Create a GitHub Release, attach the tarball, and generate
#      release notes from commits since the previous tag.
#
# Prereqs, set once on the package:
#   - Trusted Publisher configured on the npm package pointing at
#     this repo + workflow filename. No long-lived NPM_TOKEN: npm
#     authenticates the publish via GitHub's short-lived OIDC
#     token, the same mechanism that signs the provenance
#     attestation. Config lives at
#     https://www.npmjs.com/package/<pkg>/access.
#   - id-token: write permission (granted below) so the runner
#     can mint the OIDC token npm and provenance both consume.
#
# Not wired (intentional): deploy, npm-tag routing (latest vs next),
# post-publish smoke test. Add when we have a need.

name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write          # create the GitHub Release + attach artifact
  id-token: write          # sign npm provenance attestation via OIDC

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with full history for release-note generation)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node (pinned)
        # Pinned to a specific 22.x LTS release so CI reproducibility
        # doesn't depend on whichever minor setup-node resolves today.
        # registry-url is necessary so setup-node writes an .npmrc
        # that points at the public registry; without it, npm publish
        # returns ENEEDAUTH.
        uses: actions/setup-node@v4
        with:
          node-version: "22.22.2"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc + schemas + rules manifest)
        # Required before Test because cli-int-flags spawns
        # bin/ahd.js which imports from dist/, and rules-manifest.test
        # asserts the on-disk manifest matches Zod regeneration.
        # Previously prepare did this implicitly; v0.9 split it out
        # to keep the Nix sandbox build clean.
        run: npm run build

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Test
        run: npm test --silent

      - name: Validate every style token against the schema
        run: npx ahd validate-tokens

      - name: Pack tarball for the GitHub Release
        id: pack
        run: |
          # npm pack emits the tarball name on stdout (last line).
          # Capture it so the release step doesn't hardcode the
          # scope-or-name pattern. --json would be cleaner but
          # requires newer npm and mixes well-formed output.
          TARBALL="$(npm pack | tail -n 1)"
          echo "tarball=$TARBALL" >> "$GITHUB_OUTPUT"

      - name: Publish root + workspace plugins to npm with provenance
        # Serialize publishes: npm returns 409 'Failed to save packument'
        # when a second publish PUT races the first one's registry
        # processing. Loop over each package with a small sleep between
        # so the registry settles before the next publish lands.
        #
        # Auth: OIDC via Trusted Publisher. All three packages require
        # 2FA on publish, which the automation token can't satisfy
        # (token bypasses 2FA, npm rejects). OIDC is 2FA-equivalent and
        # the only accepted path. id-token: write in the permissions
        # block mints the token; npm matches the claim against each
        # package's Trusted Publisher config.
        run: |
          set -e
          # npm 10 (bundled with Node 22) cannot use OIDC as the
          # publish credential via Trusted Publisher; the token
          # exchange step between GitHub's OIDC and an npm short-
          # lived publish bearer was added in npm 11.5.1. Pinning
          # via npx rather than a global install so the runner
          # doesn't need write access to the hosted tool cache.
          NPM_VERSION=11.5.1
          for pkg_dir in . packages/eslint-plugin-ahd packages/stylelint-plugin-ahd; do
            echo "::group::publish $pkg_dir"
            (cd "$pkg_dir" && npx "npm@${NPM_VERSION}" publish --access public --provenance)
            echo "::endgroup::"
            sleep 5
          done

      - name: Extract version from tag
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from commits since previous tag
        id: notes
        run: |
          # Find the previous tag (excluding the one we're releasing).
          # If this is the first tag, compare against the root commit.
          PREV_TAG=$(git tag --sort=-v:refname | grep -v "^${{ steps.version.outputs.tag }}$" | head -n 1 || true)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          NOTES_FILE="$(mktemp)"
          ./scripts/gen-release-notes.sh "$PREV_TAG" "${{ steps.version.outputs.tag }}" > "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"
          echo "::group::generated notes"
          cat "$NOTES_FILE"
          echo "::endgroup::"

      - name: Create GitHub Release and attach tarball
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            "${{ steps.pack.outputs.tarball }}" \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file "${{ steps.notes.outputs.notes_file }}" \
            --verify-tag
