# Keep flake.nix in sync with package.json + package-lock.json.
#
# Two fields can drift:
#   - version          (mirrors package.json#version)
#   - npmDepsHash      (must match prefetch-npm-deps over package-lock.json)
#
# Drift sources:
#   - Dependabot PRs that bump dependencies → package-lock.json shifts
#   - tag-release.yml bumps version in package.json without touching flake.nix
#   - Manual dep changes on main
#
# Loop prevention: the sync PR carries a [skip-flake-sync] marker in
# its title, so the squash-merge commit does not re-trigger the job.
#
# Scope: only npmDepsHash + version. flake.lock (nixpkgs input pin) is
# refreshed by `nix flake update` on a separate cadence and is not
# touched here.

name: flake-sync

on:
  push:
    branches: [main]
    paths:
      - "package.json"
      - "package-lock.json"
      - "flake.nix"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync:
    runs-on: ubuntu-latest
    # Loop prevention: this workflow's own merge commits carry a
    # [skip-flake-sync] marker. Don't fire on them.
    if: ${{ !contains(github.event.head_commit.message, '[skip-flake-sync]') }}
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # RELEASE_PAT (not GITHUB_TOKEN) so the sync PR triggers
          # ci.yml's `test` check. PRs opened by GITHUB_TOKEN don't
          # start workflow runs, which would leave the required check
          # forever pending and auto-merge stuck.
          token: ${{ secrets.RELEASE_PAT }}

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Compute expected version + hash
        id: compute
        run: |
          set -euo pipefail
          PKG_VERSION=$(node -p "require('./package.json').version")
          # prefetch-npm-deps is the canonical tool from nixpkgs.
          NEW_HASH=$(nix --extra-experimental-features 'nix-command flakes' \
            run nixpkgs#prefetch-npm-deps -- package-lock.json)
          echo "pkg_version=$PKG_VERSION" >> "$GITHUB_OUTPUT"
          echo "new_hash=$NEW_HASH" >> "$GITHUB_OUTPUT"
          echo "Package version: $PKG_VERSION"
          echo "Package-lock hash: $NEW_HASH"

      - name: Read current flake.nix values
        id: current
        run: |
          set -euo pipefail
          CUR_VERSION=$(grep -oE 'version = "[^"]+"' flake.nix | head -n1 | sed 's/version = "\(.*\)"/\1/')
          CUR_HASH=$(grep -oE 'npmDepsHash = "[^"]+"' flake.nix | head -n1 | sed 's/npmDepsHash = "\(.*\)"/\1/')
          echo "cur_version=$CUR_VERSION" >> "$GITHUB_OUTPUT"
          echo "cur_hash=$CUR_HASH" >> "$GITHUB_OUTPUT"
          echo "Flake version: $CUR_VERSION"
          echo "Flake hash:    $CUR_HASH"

      - name: Detect drift
        id: drift
        run: |
          if [ "${{ steps.compute.outputs.pkg_version }}" != "${{ steps.current.outputs.cur_version }}" ] \
            || [ "${{ steps.compute.outputs.new_hash }}" != "${{ steps.current.outputs.cur_hash }}" ]; then
            echo "drift=true" >> "$GITHUB_OUTPUT"
            echo "::notice::flake.nix drift detected; will update."
          else
            echo "drift=false" >> "$GITHUB_OUTPUT"
            echo "::notice::flake.nix already matches; nothing to do."
          fi

      - name: Update flake.nix
        if: steps.drift.outputs.drift == 'true'
        run: |
          set -euo pipefail
          PKG_VERSION="${{ steps.compute.outputs.pkg_version }}"
          NEW_HASH="${{ steps.compute.outputs.new_hash }}"
          # sed -i '' on macOS, sed -i '' is portable enough on GNU sed,
          # but ubuntu-latest uses GNU sed where -i is fine.
          sed -i -E "s|version = \"[^\"]+\";|version = \"${PKG_VERSION}\";|" flake.nix
          sed -i -E "s|npmDepsHash = \"[^\"]+\";|npmDepsHash = \"${NEW_HASH}\";|" flake.nix

      - name: Verify flake builds
        if: steps.drift.outputs.drift == 'true'
        run: |
          # If the hash is wrong or the lockfile is incoherent, this
          # fails before we commit. Better than tag-then-fail.
          nix --extra-experimental-features 'nix-command flakes' \
            build .# --no-link --print-build-logs

      - name: Open sync PR (auto-merge)
        if: steps.drift.outputs.drift == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT }}
        run: |
          set -euo pipefail
          # main is protected (requires the `test` check), so the bot
          # can't push directly. Push to a branch and open a PR that
          # auto-merges once ci.yml goes green.
          git config user.email "noreply@adastracomputing.com"
          git config user.name "ahd-flake-sync"
          BRANCH="bot/flake-sync-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add flake.nix
          git commit -m "chore(flake): sync version + npmDepsHash [skip-flake-sync]

          Auto-generated by .github/workflows/flake-sync.yml.
          - version:     ${{ steps.current.outputs.cur_version }} -> ${{ steps.compute.outputs.pkg_version }}
          - npmDepsHash: ${{ steps.current.outputs.cur_hash }} -> ${{ steps.compute.outputs.new_hash }}"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" \
            --title "chore(flake): sync version + npmDepsHash [skip-flake-sync]" \
            --body "Auto-generated by flake-sync.yml. Merges automatically once CI passes.

          - version: \`${{ steps.current.outputs.cur_version }}\` -> \`${{ steps.compute.outputs.pkg_version }}\`
          - npmDepsHash: \`${{ steps.current.outputs.cur_hash }}\` -> \`${{ steps.compute.outputs.new_hash }}\`"
          gh pr merge "$BRANCH" --auto --squash --delete-branch
