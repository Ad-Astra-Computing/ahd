<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" role="img" aria-label="Mistral Small 3.1 on briefs/landing.yml — raw output on the left, AHD-compiled on the right, measured 21 April 2026">
  <!-- rule: swiss-editorial; paper bg, ink, single spot red, hairline rules, asymmetric -->
  <rect width="1280" height="780" fill="#f8f5ee"/>

