  <g font-family="'Neue Haas Grotesk Text',Inter,sans-serif" font-size="12" fill="#141414">
    <text x="80" y="740">3.25 mean tells / page · n=4 raw samples scored</text>
    <text x="80" y="758" fill="#6b6b6b">fires: require-type-pairing · radius-hierarchy · require-named-grid · line-height-per-size</text>
