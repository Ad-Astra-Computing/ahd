<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-label="Slop versus AHD">
  <!-- rule: split canvas; left = slop median, right = swiss-editorial compile -->
  <rect width="600" height="520" fill="#0a0a0a"/>
  <rect x="600" width="600" height="520" fill="#f8f5ee"/>

  <!-- LEFT: the slop median, dramatised -->
  <defs>
    <linearGradient id="slop-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="0.5" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#ec4899"/>
    </linearGradient>
    <linearGradient id="slop-text" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#a855f7"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <circle cx="300" cy="260" r="260" fill="url(#slop-grad)" opacity="0.35"/>
  <rect x="232" y="112" width="136" height="28" rx="14" fill="#1f1f1f" stroke="#2a2a2a"/>
  <text x="300" y="130" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="12" fill="#d4d4d8">✨ Now in beta</text>
  <text x="300" y="210" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="48" font-weight="600" fill="url(#slop-text)">Build the future of AI</text>
  <text x="300" y="244" text-anchor="middle" font-family="Inter,system-ui,sans-serif"
        font-size="16" fill="#a1a1aa">Ship faster. Seamless. AI-native.</text>
  <!-- three equal rounded cards -->
  <g font-family="Inter,system-ui,sans-serif" fill="#d4d4d8">
    <rect x="80" y="300" width="140" height="140" rx="16" fill="#111" stroke="#262626"/>
    <rect x="230" y="300" width="140" height="140" rx="16" fill="#111" stroke="#262626"/>
    <rect x="380" y="300" width="140" height="140" rx="16" fill="#111" stroke="#262626"/>
    <rect x="96" y="316" width="28" height="28" rx="8" fill="#312e81"/>
    <rect x="246" y="316" width="28" height="28" rx="8" fill="#312e81"/>
    <rect x="396" y="316" width="28" height="28" rx="8" fill="#312e81"/>
    <text x="96" y="380" font-size="14" font-weight="600">Fast</text>
    <text x="246" y="380" font-size="14" font-weight="600">Secure</text>
    <text x="396" y="380" font-size="14" font-weight="600">Magic</text>
  </g>
  <text x="20" y="500" font-family="Inter,system-ui,sans-serif" font-size="10"
        letter-spacing="0.1em" fill="#52525b">BEFORE / MEDIAN OUTPUT</text>

  <!-- RIGHT: compiled via swiss-editorial -->
  <line x1="660" y1="60" x2="660" y2="460" stroke="#141414" stroke-width="1"/>
  <text x="676" y="84" font-family="'Neue Haas Grotesk Display',Inter,sans-serif"
        font-size="11" letter-spacing="0.14em" fill="#141414">AHD / COMPILED · SWISS-EDITORIAL</text>
  <text x="676" y="220" font-family="'Neue Haas Grotesk Display',Inter,sans-serif"
        font-size="112" font-weight="700" letter-spacing="-0.035em" fill="#141414">Specific.</text>
  <text x="676" y="272" font-family="'Neue Haas Grotesk Display',Inter,sans-serif"
        font-size="112" font-weight="300" letter-spacing="-0.035em" fill="#141414" font-style="italic">Not generic.</text>
  <rect x="1176" y="60" width="8" height="400" fill="#c53a1a"/>
  <text x="676" y="332" font-family="'Neue Haas Grotesk Text',Inter,sans-serif"
        font-size="16" fill="#141414">The same brief, compiled through a style token.</text>
  <text x="676" y="356" font-family="'Neue Haas Grotesk Text',Inter,sans-serif"
        font-size="16" fill="#141414">12-col grid. Sharp edges. One spot colour.</text>
  <text x="676" y="380" font-family="'Neue Haas Grotesk Text',Inter,sans-serif"
        font-size="16" fill="#141414">No gradients. No shimmer. No three cards.</text>
  <text x="676" y="500" font-family="'Neue Haas Grotesk Text',Inter,sans-serif"
        font-size="10" letter-spacing="0.1em" fill="#6b6b6b">AFTER / AHD COMPILED OUTPUT</text>
</svg>
