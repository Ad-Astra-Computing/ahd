  <!-- BEFORE label -->
  <text x="80" y="180" font-family="'Neue Haas Grotesk Display',Inter,sans-serif"
        font-size="10" letter-spacing="0.16em" fill="#6b6b6b">BEFORE · RAW BRIEF, NO AHD</text>
  <!-- AFTER label -->
  <text x="680" y="180" font-family="'Neue Haas Grotesk Display',Inter,sans-serif"
