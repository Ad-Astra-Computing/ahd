  <!-- after frame + screenshot + spot stripe -->
  <rect x="680" y="196" width="520" height="520" fill="#ffffff" stroke="#141414" stroke-width="1"/>
  <image href="screenshots/mistral-compiled-001.png" x="681" y="197" width="518" height="518" preserveAspectRatio="xMidYMid slice"/>
  <rect x="1200" y="196" width="8" height="520" fill="#c53a1a"/>

