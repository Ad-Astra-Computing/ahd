<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" role="img" aria-label="Artificial Human Design">
  <!-- rule: swiss-editorial token; paper bg, ink, single spot colour used once -->
  <rect width="1200" height="400" fill="#f8f5ee"/>
  <!-- rule: hairline vertical rule aligned to the 12-col grid -->
  <line x1="80" y1="48" x2="80" y2="352" stroke="#141414" stroke-width="1"/>
  <!-- rule: micro caps label, tracking +0.08em, aligned to grid -->
  <text x="96" y="72" font-family="'Neue Haas Grotesk Display','Helvetica Now','Inter Tight',sans-serif"
        font-size="13" letter-spacing="0.12em" fill="#141414">
    AHD / ARTIFICIAL HUMAN DESIGN
  </text>
  <!-- rule: display anchor word at 176px, tracking -0.02em, bleeds past grid on the right -->
  <text x="96" y="232" font-family="'Neue Haas Grotesk Display','Helvetica Now','Inter Tight',sans-serif"
        font-size="176" font-weight="700" letter-spacing="-0.035em" fill="#141414">
    Make it specific.
  </text>
  <!-- rule: spot colour used exactly once, as a narrow vertical block -->
  <rect x="1112" y="48" width="8" height="304" fill="#c53a1a"/>
  <!-- rule: sub-deck set in text size, measure limited, left-aligned -->
  <text x="96" y="292" font-family="'Neue Haas Grotesk Text','Helvetica Now Text','Inter',sans-serif"
        font-size="18" fill="#141414">
    A brief compiler, linter and style-token library that
  </text>
  <text x="96" y="316" font-family="'Neue Haas Grotesk Text','Helvetica Now Text','Inter',sans-serif"
        font-size="18" fill="#141414">
    forces LLMs out of design slop.
  </text>
  <!-- Ad Astra Computing mark: twin-ellipse orbit + four-point star,
       geometry taken verbatim from adastracomputing.com/favicon.svg
       so the ahd-mark and the live brand stay bit-identical. Ink
       colour substituted for white to sit on the swiss-editorial
       paper; stroke uses non-scaling-stroke so the orbit lines
       stay crisp at small scale. -->
  <g transform="translate(96, 346) scale(0.5)">
    <ellipse cx="16" cy="18" rx="15" ry="6" stroke="#141414" stroke-width="2"
             vector-effect="non-scaling-stroke" fill="none" transform="rotate(-15, 16, 18)"/>
    <ellipse cx="16" cy="18" rx="15" ry="6" stroke="#141414" stroke-width="2"
             vector-effect="non-scaling-stroke" fill="none" transform="rotate(15, 16, 18)"/>
    <path d="M16 2C16.3 8 17 10 24 10.5C17 11 16.3 13 16 19C15.7 13 15 11 8 10.5C15 10 15.7 8 16 2Z" fill="#141414"/>
  </g>
  <!-- rule: metadata row, tabular feel, micro scale, left-aligned to grid
       (shifted right to sit past the Ad Astra Computing mark). -->
  <text x="120" y="360" font-family="'Neue Haas Grotesk Text','Helvetica Now Text','Inter',sans-serif"
        font-size="11" letter-spacing="0.08em" fill="#6b6b6b">
    Ad Astra Computing  ·  FSL-1.1-Apache-2.0
  </text>
</svg>
