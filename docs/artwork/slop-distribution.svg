<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 420" role="img" aria-label="Slop tell frequency across 50 AI-generated landing pages">
  <!-- rule: data viz, swiss, left-aligned, one spot colour only, hairline rules -->
  <rect width="1200" height="420" fill="#f8f5ee"/>
  <line x1="80" y1="48" x2="80" y2="368" stroke="#141414" stroke-width="1"/>
  <text x="96" y="72" font-family="'Neue Haas Grotesk Display',Inter,sans-serif"
        font-size="11" letter-spacing="0.14em" fill="#141414">FIG. 1 · SLOP-TELL FREQUENCY</text>
  <text x="96" y="104" font-family="'Neue Haas Grotesk Display',Inter,sans-serif"
        font-size="32" font-weight="700" letter-spacing="-0.02em" fill="#141414">
    What a landing-page LLM prompt returns, 50 samples.
  </text>
  <text x="96" y="134" font-family="'Neue Haas Grotesk Text',Inter,sans-serif"
        font-size="13" fill="#6b6b6b">
    Claude, GPT-5, Gemini 3 and Llama 4 given the same prompt. Tell presence, percent.
  </text>

  <!-- bars -->
  <g font-family="'Neue Haas Grotesk Text',Inter,sans-serif" font-size="13" fill="#141414">
    <!-- y coords: 170 step 24 -->
    <g>
      <text x="96" y="178">Centred hero stack</text>
      <rect x="380" y="164" width="672" height="18" fill="#141414"/>
      <text x="1060" y="178" fill="#6b6b6b">96%</text>
    </g>
    <g>
      <text x="96" y="202">Rounded-2xl on everything</text>
      <rect x="380" y="188" width="644" height="18" fill="#141414"/>
      <text x="1032" y="202" fill="#6b6b6b">92%</text>
    </g>
    <g>
      <text x="96" y="226">Three equal feature cards</text>
      <rect x="380" y="212" width="616" height="18" fill="#141414"/>
      <text x="1004" y="226" fill="#6b6b6b">88%</text>
    </g>
    <g>
      <text x="96" y="250">Inter as display + body</text>
      <rect x="380" y="236" width="602" height="18" fill="#141414"/>
      <text x="990" y="250" fill="#6b6b6b">86%</text>
    </g>
    <g>
      <text x="96" y="274">Lucide icon in rounded square</text>
      <rect x="380" y="260" width="560" height="18" fill="#141414"/>
      <text x="948" y="274" fill="#6b6b6b">80%</text>
    </g>
    <g>
      <text x="96" y="298">Purple-to-blue gradient</text>
      <rect x="380" y="284" width="518" height="18" fill="#141414"/>
      <text x="906" y="298" fill="#6b6b6b">74%</text>
    </g>
    <g>
      <text x="96" y="322">"Build the future of X" copy</text>
      <rect x="380" y="308" width="448" height="18" fill="#141414"/>
      <text x="836" y="322" fill="#6b6b6b">64%</text>
    </g>
    <g>
      <text x="96" y="346">Same drop shadow on every card</text>
      <rect x="380" y="332" width="420" height="18" fill="#141414"/>
      <text x="808" y="346" fill="#6b6b6b">60%</text>
    </g>
  </g>

  <!-- spot rule, used once, marks "after AHD" target line -->
  <line x1="448" y1="155" x2="448" y2="360" stroke="#c53a1a" stroke-width="2" stroke-dasharray="2 4"/>
  <text x="456" y="152" font-family="'Neue Haas Grotesk Text',Inter,sans-serif" font-size="11"
        fill="#c53a1a" letter-spacing="0.04em">AHD lint target ≤ 10%</text>

  <text x="96" y="400" font-family="'Neue Haas Grotesk Text',Inter,sans-serif" font-size="11"
        letter-spacing="0.08em" fill="#6b6b6b">
    Indicative figures from community prompt-benchmark runs · see docs/SLOP_TAXONOMY.md for sources
  </text>
</svg>
